services:
  user-api:
    image: HardwareNexus-user-api:latest
    container_name: HardwareNexus-user-api-container
    build:
      context: ./HardwareNexus_UserApi
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/https.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${CERT_PASSWORD}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${USER_API_AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${USER_API_AZURE_CLIENT_SECRET}
      ASPNETCORE_URLS: https://+:${CONTAINER_HTTPS_PORT}
      ASPNETCORE_HTTPS_PORTS: ${CONTAINER_HTTPS_PORT}
    ports:
      - "${USER_API_PORT}:${CONTAINER_HTTPS_PORT}"
    volumes:
      - ${SHARED_CERT}:/https/https.pfx:ro
    networks:
      - HardwareNexus-network
    restart: unless-stopped

  product-api:
    image: HardwareNexus-product-api:latest
    container_name: HardwareNexus-product-api-container
    build:
      context: ./HardwareNexus_ProductApi
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/https.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${CERT_PASSWORD}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${PRODUCT_API_AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${PRODUCT_API_AZURE_CLIENT_SECRET}
      ASPNETCORE_URLS: https://+:${CONTAINER_HTTPS_PORT}
      ASPNETCORE_HTTPS_PORTS: ${CONTAINER_HTTPS_PORT}
    ports:
      - "${PRODUCT_API_PORT}:${CONTAINER_HTTPS_PORT}"
    volumes:
      - ${SHARED_CERT}:/https/https.pfx:ro
    networks:
      - HardwareNexus-network
    restart: unless-stopped

  gateway-api:
    image: HardwareNexus-apigateway:latest
    container_name: HardwareNexus-apigateway-container
    build:
      context: ./HardwareNexus.ApiGateway
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "${GATEWAY_API_PORT}:${CONTAINER_HTTPS_PORT}"
    volumes:
      - ${SHARED_CERT}:/https/https.pfx:ro
    networks:
      - HardwareNexus-network
    restart: unless-stopped


  website:
    image: HardwareNexus-website:latest
    container_name: HardwareNexus-website-container
    build:
      context: ../WebstormProjects/HardwareNexus_Website_Angular
      dockerfile: Dockerfile
    ports:
      - "${WEBSITE_PORT}:${WEBSITE_PORT}"
    networks:
      - HardwareNexus-network
    restart: unless-stopped

networks:
  HardwareNexus-network:
    driver: bridge
