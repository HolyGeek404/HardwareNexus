<a [routerLink]="['products',category()]" class="d-flex flex-column justify-content-evenly category-card">
    <div class="text-center p-3 category-card__icon">
        <img alt="category icon" height="96" ngSrc="{{categoryImgPath()}}" width="96">
    </div>
    <span class="text-center category-card__label">{{ category() }}</span>
</a>
